name: Vellum
options:
  bundleIdPrefix: com.vellum
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9DCG97VASG
    DEAD_CODE_STRIPPING: "YES"
    TARGETED_DEVICE_FAMILY: "2"  # iPad only
schemes:
  Vellum:
    build:
      targets:
        Vellum: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VellumTests
targets:
  VellumTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Vellum
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ayushdeolasee.vellum.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Vellum.app/Vellum
        BUNDLE_LOADER: $(TEST_HOST)
  Vellum:
    type: application
    platform: iOS
    sources:
      - path: Vellum
        excludes:
          - "Resources/Info.plist"
          - "Resources/Info-iOS.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ayushdeolasee.vellum
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "2"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Vellum/Resources/Info-iOS.plist
        ENABLE_HARDENED_RUNTIME: "NO"
        SUPPORTS_MACCATALYST: "NO"
